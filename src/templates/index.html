<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>MindOS · 知识库</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f5f7; color: #1d1d1f; }
  header { background: #1d1d1f; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; margin: 0; }
  header select { background: #333; color: #fff; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; }
  header .icon-btn { background: #333; color: #fff; border: 1px solid #555; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  nav { display: flex; gap: 4px; background: #fff; padding: 0 24px; border-bottom: 1px solid #e5e5e7; }
  nav button { background: none; border: none; padding: 12px 16px; cursor: pointer; font-size: 14px; color: #6e6e73; border-bottom: 2px solid transparent; }
  nav button.active { color: #1d1d1f; border-bottom-color: #1d1d1f; }
  main { padding: 24px; }
  .tab { display: none; }
  .tab.active { display: block; }
  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; height: calc(100vh - 120px); }
  .panel { background: #fff; border-radius: 8px; padding: 16px; overflow: auto; border: 1px solid #e5e5e7; }
  .tree-node { margin-left: 12px; }
  .tree-dir { cursor: pointer; padding: 2px 0; user-select: none; }
  .tree-dir::before { content: "▶ "; font-size: 10px; color: #999; }
  .tree-dir.open::before { content: "▼ "; }
  .tree-file { padding: 2px 0 2px 18px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .tree-file:hover { background: #f0f0f2; }
  .tree-file.selected { background: #e8e8ed; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.unindexed { background: #ccc; }
  .dot.current { background: #34c759; }
  .dot.stale { background: #ff9500; }
  .checkbox { margin-right: 4px; }
  .actions { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
  .btn { background: #1d1d1f; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  .btn.secondary { background: #fff; color: #1d1d1f; border: 1px solid #d2d2d7; }
  .btn.danger { background: #ff3b30; }
  #doc-content { white-space: pre-wrap; font-family: -apple-system, "PingFang SC", sans-serif; line-height: 1.6; }
  #doc-content h1, #doc-content h2, #doc-content h3 { margin-top: 1.4em; }
  #doc-content pre { background: #f5f5f7; padding: 12px; border-radius: 6px; overflow: auto; }
  #doc-content code { font-family: "SF Mono", Menlo, monospace; font-size: 13px; }
  #doc-content table { border-collapse: collapse; }
  #doc-content th, #doc-content td { border: 1px solid #d2d2d7; padding: 6px 10px; }
  #doc-content img { max-width: 100%; }
  .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-box input { flex: 1; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 14px; }
  .result { background: #fff; border: 1px solid #e5e5e7; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .result-meta { font-size: 12px; color: #6e6e73; margin-bottom: 6px; }
  .result-meta .score { float: right; }
  .result-text { font-size: 14px; line-height: 1.5; }
  .result-text mark { background: #fff3a0; padding: 0 2px; }
  .ask-box { display: flex; gap: 8px; margin-bottom: 16px; }
  .ask-box input { flex: 1; padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 14px; }
  #answer { background: #fff; border: 1px solid #e5e5e7; border-radius: 8px; padding: 16px; min-height: 120px; white-space: pre-wrap; line-height: 1.6; }
  #sources { margin-top: 12px; }
  .source-item { font-size: 13px; color: #1d1d1f; padding: 6px 0; border-bottom: 1px dashed #e5e5e7; cursor: pointer; }
  .source-item:hover { color: #0071e3; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1d1d1f; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .3s; }
  .toast.show { opacity: 1; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 8px; padding: 24px; width: 560px; max-height: 80vh; overflow: auto; }
  .modal h2 { margin: 0 0 16px; font-size: 18px; }
  .modal .form-row { margin-bottom: 12px; }
  .modal label { display: block; font-size: 13px; color: #6e6e73; margin-bottom: 4px; }
  .modal input, .modal select { width: 100%; padding: 6px 10px; border: 1px solid #d2d2d7; border-radius: 6px; font-size: 14px; }
  .modal .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal .actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }
  .kb-list-item { padding: 10px 12px; border: 1px solid #e5e5e7; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .kb-list-item .info { flex: 1; }
  .kb-list-item .name { font-weight: 600; }
  .kb-list-item .meta { font-size: 12px; color: #6e6e73; }
  .empty { text-align: center; padding: 60px 20px; color: #999; }
</style>
</head>
<body>
<header>
  <h1>MindOS</h1>
  <select id="kb-select"><option value="">加载中...</option></select>
  <button class="icon-btn" id="btn-manage" title="知识库管理">⚙ 管理</button>
  <span style="flex:1"></span>
  <span id="kb-status" style="font-size:12px;color:#999"></span>
</header>
<nav>
  <button class="active" data-tab="docs">文档</button>
  <button data-tab="search">搜索</button>
  <button data-tab="ask">问答</button>
</nav>
<main>
  <div id="tab-docs" class="tab active">
    <div class="actions">
      <input type="checkbox" id="select-all" class="checkbox"><label for="select-all" style="font-size:13px">全选</label>
      <button class="btn" id="btn-ingest">导入到知识库</button>
      <button class="btn secondary" id="btn-refresh">更新知识库</button>
    </div>
    <div class="layout">
      <div class="panel" id="tree-panel"></div>
      <div class="panel" id="doc-panel"><div id="doc-content" style="color:#999">选择左侧文件查看内容</div></div>
    </div>
  </div>

  <div id="tab-search" class="tab">
    <div class="search-box">
      <input id="search-input" placeholder="输入搜索词，回车搜索">
      <button class="btn" id="btn-search">搜索</button>
    </div>
    <div id="search-results"></div>
  </div>

  <div id="tab-ask" class="tab">
    <div class="ask-box">
      <input id="ask-input" placeholder="提出你的问题，回车发送">
      <button class="btn" id="btn-ask">提问</button>
    </div>
    <div id="answer" style="color:#999">答案会显示在这里...</div>
    <div id="sources"></div>
  </div>

  <div id="tab-manage" class="tab">
    <div class="actions">
      <button class="btn" id="btn-new-kb">新建知识库</button>
    </div>
    <div id="kb-list"></div>
  </div>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <h2 id="modal-title">新建知识库</h2>
    <div class="form-row">
      <label>知识库标识 (kb_name，英文唯一)</label>
      <input id="f-kb_name" placeholder="如 my_kb">
    </div>
    <div class="form-row">
      <label>显示名称</label>
      <input id="f-display_name" placeholder="如 我的知识库">
    </div>
    <div class="form-row">
      <label>数据目录 (workspace 绝对路径)</label>
      <input id="f-workspace" placeholder="如 /home/user/data/my_kb">
    </div>
    <div class="form-row">
      <label>Milvus collection 名</label>
      <input id="f-collection" placeholder="如 kb_my_kb">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Embedding provider</label>
        <select id="f-embedding_provider"><option value="omlx">omlx</option></select>
      </div>
      <div class="form-row">
        <label>Embedding model</label>
        <input id="f-embedding_model" value="bge-m3-mlx-fp16">
      </div>
      <div class="form-row">
        <label>LLM provider</label>
        <select id="f-llm_provider"><option value="omlx">omlx</option></select>
      </div>
      <div class="form-row">
        <label>LLM model</label>
        <input id="f-llm_model" value="Qwen2.5-7B-Instruct-4bit">
      </div>
      <div class="form-row">
        <label>Embedding base_url</label>
        <input id="f-embedding_base_url" value="http://localhost:8000">
      </div>
      <div class="form-row">
        <label>LLM base_url</label>
        <input id="f-llm_base_url" value="http://localhost:8000">
      </div>
    </div>
    <div class="actions">
      <button class="btn secondary" id="btn-modal-cancel">取消</button>
      <button class="btn" id="btn-modal-save">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
let currentKb = '';
let selectedFiles = new Set();
let editingKb = null;

async function init() {
  await loadKbs();
  document.getElementById('btn-manage').addEventListener('click', () => showTab('manage'));
  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.tab));
  });
}

function showTab(tab) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const navBtn = document.querySelector(`nav button[data-tab="${tab}"]`);
  if (navBtn) navBtn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'manage') loadKbList();
  if (tab === 'docs') loadTree();
}

async function loadKbs() {
  const res = await fetch('/api/kbs');
  const data = await res.json();
  const sel = document.getElementById('kb-select');
  sel.innerHTML = '';
  if (!data.kbs.length) {
    sel.innerHTML = '<option value="">无知识库</option>';
    document.getElementById('kb-status').textContent = '请先创建知识库';
    return;
  }
  data.kbs.forEach(kb => {
    const opt = document.createElement('option');
    opt.value = kb.kb_name;
    opt.textContent = kb.display_name || kb.kb_name;
    sel.appendChild(opt);
  });
  if (!currentKb || !data.kbs.find(k => k.kb_name === currentKb)) {
    currentKb = data.kbs[0].kb_name;
  }
  sel.value = currentKb;
  sel.onchange = () => { currentKb = sel.value; loadTree(); };
  document.getElementById('kb-status').textContent = '';
}

async function loadKbList() {
  const res = await fetch('/api/kbs');
  const data = await res.json();
  const list = document.getElementById('kb-list');
  list.innerHTML = '';
  if (!data.kbs.length) {
    list.innerHTML = '<div class="empty">还没有知识库，点「新建知识库」创建第一个</div>';
    return;
  }
  data.kbs.forEach(kb => {
    const div = document.createElement('div');
    div.className = 'kb-list-item';
    div.innerHTML = `
      <div class="info">
        <div class="name">${kb.display_name} <span style="color:#999;font-weight:normal">(${kb.kb_name})</span></div>
        <div class="meta">${kb.workspace} · ${kb.embedding_model} · ${kb.llm_model}</div>
      </div>
      <button class="btn secondary" data-act="edit" data-kb="${kb.kb_name}">编辑</button>
      <button class="btn secondary" data-act="dup" data-kb="${kb.kb_name}">复制</button>
      <button class="btn danger" data-act="del" data-kb="${kb.kb_name}">删除</button>
    `;
    list.appendChild(div);
  });
  list.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', async () => {
      const kb = btn.dataset.kb;
      const act = btn.dataset.act;
      if (act === 'edit') openModal(kb);
      else if (act === 'dup') {
        const newName = prompt('新知识库标识 (kb_name):', kb + '_copy');
        if (!newName) return;
        const res = await fetch(`/api/kbs/${encodeURIComponent(kb)}/duplicate?new_name=${encodeURIComponent(newName)}`, {method:'POST'});
        if (res.ok) { toast('复制成功'); loadKbList(); loadKbs(); }
        else { const e = await res.json(); toast('复制失败: ' + e.detail); }
      } else if (act === 'del') {
        if (!confirm(`确认删除知识库 ${kb}？\n（只删配置，Milvus 数据和文件不删）`)) return;
        const res = await fetch(`/api/kbs/${encodeURIComponent(kb)}`, {method:'DELETE'});
        if (res.ok) { toast('已删除'); loadKbList(); loadKbs(); }
      }
    });
  });
}

document.getElementById('btn-new-kb').addEventListener('click', () => openModal(null));

function openModal(kbName) {
  editingKb = kbName;
  document.getElementById('modal-title').textContent = kbName ? '编辑知识库' : '新建知识库';
  const fields = ['kb_name','display_name','workspace','collection','embedding_provider','embedding_model','embedding_base_url','llm_provider','llm_model','llm_base_url'];
  if (kbName) {
    fetch('/api/kbs').then(r => r.json()).then(data => {
      const kb = data.kbs.find(k => k.kb_name === kbName);
      fields.forEach(f => { const el = document.getElementById('f-' + f); if (el) el.value = kb[f] || ''; });
      document.getElementById('f-kb_name').disabled = true;
    });
  } else {
    fields.forEach(f => { const el = document.getElementById('f-' + f); if (el) el.value = ''; });
    document.getElementById('f-kb_name').disabled = false;
    document.getElementById('f-embedding_model').value = 'bge-m3-mlx-fp16';
    document.getElementById('f-llm_model').value = 'Qwen2.5-7B-Instruct-4bit';
    document.getElementById('f-embedding_base_url').value = 'http://localhost:8000';
    document.getElementById('f-llm_base_url').value = 'http://localhost:8000';
    document.getElementById('f-embedding_provider').value = 'omlx';
    document.getElementById('f-llm_provider').value = 'omlx';
  }
  document.getElementById('modal-bg').classList.add('show');
}

document.getElementById('btn-modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('show');
});

document.getElementById('btn-modal-save').addEventListener('click', async () => {
  const payload = {};
  ['kb_name','display_name','workspace','collection','embedding_provider','embedding_model','embedding_base_url','llm_provider','llm_model','llm_base_url'].forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el && el.value) payload[f] = el.value;
  });
  try {
    let res;
    if (editingKb) {
      res = await fetch(`/api/kbs/${encodeURIComponent(editingKb)}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
      });
    } else {
      res = await fetch('/api/kbs', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
      });
    }
    if (!res.ok) { const e = await res.json(); toast('保存失败: ' + e.detail); return; }
    toast('已保存');
    document.getElementById('modal-bg').classList.remove('show');
    loadKbList();
    loadKbs();
  } catch (e) {
    toast('保存失败: ' + e.message);
  }
});

async function loadTree() {
  if (!currentKb) return;
  const res = await fetch(`/api/${encodeURIComponent(currentKb)}/tree`);
  if (!res.ok) { document.getElementById('tree-panel').innerHTML = '<div class="empty">无法加载</div>'; return; }
  const data = await res.json();
  const panel = document.getElementById('tree-panel');
  panel.innerHTML = '';
  selectedFiles.clear();
  if (!data.tree.files.length && !Object.keys(data.tree.children).length) {
    panel.innerHTML = '<div class="empty">目录为空，请先往 workspace 放入 .md 文件</div>';
    return;
  }
  renderTree(data.tree, panel, 0);
}

function renderTree(node, parent, depth) {
  for (const [name, child] of Object.entries(node.children || {})) {
    const dirDiv = document.createElement('div');
    dirDiv.className = 'tree-dir';
    dirDiv.style.marginLeft = (depth * 12) + 'px';
    dirDiv.textContent = name;
    parent.appendChild(dirDiv);
    const childContainer = document.createElement('div');
    childContainer.className = 'tree-node';
    childContainer.style.display = 'none';
    parent.appendChild(childContainer);
    dirDiv.addEventListener('click', () => {
      dirDiv.classList.toggle('open');
      childContainer.style.display = dirDiv.classList.contains('open') ? '' : 'none';
    });
    renderTree(child, childContainer, depth + 1);
  }
  for (const f of node.files || []) {
    const fileDiv = document.createElement('div');
    fileDiv.className = 'tree-file';
    fileDiv.style.marginLeft = (depth * 12) + 'px';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'checkbox';
    cb.dataset.path = f.path;
    cb.addEventListener('change', () => {
      if (cb.checked) selectedFiles.add(f.path);
      else selectedFiles.delete(f.path);
    });
    const dot = document.createElement('span');
    dot.className = 'dot ' + f.status;
    dot.title = f.status === 'current' ? '已入库（最新）' : f.status === 'stale' ? '已入库（落后）' : '未入库';
    const label = document.createElement('span');
    label.textContent = f.name === 'index.md' ? (f.title || f.name) : f.name;
    fileDiv.appendChild(cb);
    fileDiv.appendChild(dot);
    fileDiv.appendChild(label);
    fileDiv.addEventListener('click', (e) => {
      if (e.target === cb) return;
      document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('selected'));
      fileDiv.classList.add('selected');
      loadFile(f.path);
    });
    parent.appendChild(fileDiv);
  }
}

document.getElementById('select-all').addEventListener('change', (e) => {
  document.querySelectorAll('.tree-file .checkbox').forEach(cb => {
    cb.checked = e.target.checked;
    if (cb.checked) selectedFiles.add(cb.dataset.path);
    else selectedFiles.delete(cb.dataset.path);
  });
});

async function loadFile(path) {
  const res = await fetch(`/api/${encodeURIComponent(currentKb)}/file?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  let content = data.content.replace(/^---\n.*?\n---\n/s, '');
  document.getElementById('doc-content').innerHTML = marked.parse(content);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('btn-ingest').addEventListener('click', async () => {
  if (!currentKb) { toast('请先选择知识库'); return; }
  if (selectedFiles.size === 0) { toast('请先勾选文件'); return; }
  const btn = document.getElementById('btn-ingest');
  btn.disabled = true; btn.textContent = '导入中...';
  try {
    const res = await fetch(`/api/${encodeURIComponent(currentKb)}/ingest`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({files: Array.from(selectedFiles)})
    });
    const data = await res.json();
    toast(`新增 ${data.added} / 更新 ${data.updated} / 跳过 ${data.skipped}` + (data.failed ? ` / 失败 ${data.failed}` : ''));
    loadTree();
  } catch (e) { toast('导入失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '导入到知识库'; }
});

document.getElementById('btn-refresh').addEventListener('click', async () => {
  if (!currentKb) return;
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true; btn.textContent = '更新中...';
  try {
    const res = await fetch(`/api/${encodeURIComponent(currentKb)}/refresh`, {method:'POST'});
    const data = await res.json();
    toast(`新增 ${data.added} / 更新 ${data.updated} / 跳过 ${data.skipped} / 删除 ${data.deleted}` + (data.failed ? ` / 失败 ${data.failed}` : ''));
    loadTree();
  } catch (e) { toast('更新失败: ' + e.message); }
  finally { btn.disabled = false; btn.textContent = '更新知识库'; }
});

async function doSearch() {
  if (!currentKb) return;
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const res = await fetch(`/api/${encodeURIComponent(currentKb)}/search?q=${encodeURIComponent(q)}&top=10`);
  const data = await res.json();
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  if (!data.results.length) { container.innerHTML = '<div class="empty">无匹配结果</div>'; return; }
  data.results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'result';
    div.innerHTML = `<div class="result-meta"><span>${r.title || ''} › ${r.section || ''}</span><span class="score">score: ${r.score.toFixed(4)}</span></div><div class="result-text">${escapeHtml(r.text).replace(new RegExp(escapeReg(q), 'gi'), m => '<mark>'+m+'</mark>')}</div>`;
    container.appendChild(div);
  });
}

document.getElementById('btn-search').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

async function doAsk() {
  if (!currentKb) return;
  const q = document.getElementById('ask-input').value.trim();
  if (!q) return;
  const ans = document.getElementById('answer');
  const src = document.getElementById('sources');
  ans.textContent = ''; src.innerHTML = '';
  ans.style.color = '#1d1d1f';
  const res = await fetch(`/api/${encodeURIComponent(currentKb)}/ask`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({question: q})
  });
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, {stream: true});
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6);
      if (payload === '[DONE]') continue;
      try {
        const evt = JSON.parse(payload);
        if (evt.type === 'sources') {
          evt.data.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = 'source-item';
            d.textContent = `【来源 ${i+1}】${s.title} > ${s.section}`;
            d.addEventListener('click', () => {
              showTab('docs');
              setTimeout(() => loadFile(s.path), 100);
            });
            src.appendChild(d);
          });
        } else if (evt.type === 'token') {
          ans.textContent += evt.data;
        }
      } catch (e) {}
    }
  }
}

document.getElementById('btn-ask').addEventListener('click', doAsk);
document.getElementById('ask-input').addEventListener('keydown', e => { if (e.key === 'Enter') doAsk(); });

function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

init();
</script>
